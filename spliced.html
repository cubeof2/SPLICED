<main>

    <section class="heal f-row">
      <div>
        <h3>0</h3>
          <b>Dying</b> <br>
          3 turns<br>
          'til death
      </div>
      <div>
        <h3>1</h3>
          <b>Unconscious</b> <br>
          until healed<br>
          or recharged
      </div>
      <div>
        <h3>2</h3>
          <b>Injured</b> <br>
          disadvantage<br>

      </div>
      <div>

      </div>
      <div>

  <script type="text/worker">
    on("change:sp_max change:ftg", function() {
      getAttrs(["sp_max", "ftg"], function(values) {
        const sp_max = parseInt(values.sp_max, 10) || 0;
        const ftg = parseInt(values.ftg, 10) || 0;
        const eff_sp_max = Math.max(sp_max - ftg, 0);
  
        setAttrs({
          eff_sp_max: eff_sp_max
        });
      });
    });
  </script>
